version: '3.8'

services:
  stemflow-app:
    build: .
    container_name: stemflow-prod
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=/app/data/sqlite.db
      - SESSION_DIR=/app/data
      - SESSION_SECRET=changeThisSecretInProductionMode123!
    volumes:
      - stemflow-data:/app/data

volumes:
  stemflow-data:

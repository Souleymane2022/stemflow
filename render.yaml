services:
  - type: web
    name: stemflow-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        value: sqlite.db
      - key: SESSION_DIR
        value: .
      - key: OPENAI_API_KEY
        value: dummy_key_for_build
      - key: SESSION_SECRET
        generateValue: true
